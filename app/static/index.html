<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgenThink — AI Agent Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --bubble-user: linear-gradient(135deg, #4f46e5, #6366f1);
            --bubble-agent: rgba(31, 41, 55, 0.5);
            --accent: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
        }

        .container {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 12px;
            height: 12px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--primary);
        }

        .brand-title {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Scrollbar */
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.agent {
            align-self: flex-start;
        }

        .bubble {
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message.user .bubble {
            background: var(--bubble-user);
            border-bottom-right-radius: 4px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .message.agent .bubble {
            background: var(--bubble-agent);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        /* Metadata & Traces */
        .meta-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message.user .meta-tag {
            align-self: flex-end;
        }

        .trace-box {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .trace-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .trace-item:last-child {
            margin-bottom: 0;
        }

        /* Input Area */
        .input-container {
            padding: 20px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .chat-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .send-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 14px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        /* Empty State */
        .empty-state {
            margin: auto;
            text-align: center;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .empty-state p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="brand">
                <div class="brand-logo"></div>
                <span class="brand-title">AgenThink Portal</span>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span>Connected (Port 8000)</span>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="empty-state" id="emptyState">
                <h3>Chào mừng đến với AgenThink!</h3>
                <p>Hãy gửi tin nhắn đầu tiên để tương tác với Agent. Bạn có thể sử dụng các tool gọi API như Weather, Calculator, RAG, Vision (dOCRead) hay Fashion (SketClothes/VirtuaLook) để trải nghiệm.</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="Nhập câu hỏi hoặc lệnh cho Agent..." autofocus>
            <button class="send-btn" id="sendBtn">
                Gửi
            </button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyState = document.getElementById('emptyState');

        function appendMessage(sender, text, meta = null) {
            if (emptyState) {
                emptyState.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            // Bubble text
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            // Replace newlines with breaks
            const safeText = text || "";
            bubble.innerHTML = safeText.replace(/\n/g, '<br>');
            messageDiv.appendChild(bubble);

            // Metadata tag & traces
            if (meta) {
                const metaTag = document.createElement('span');
                metaTag.className = 'meta-tag';
                const costStr = meta.estimated_cost_usd !== null && meta.estimated_cost_usd !== undefined
                    ? ` | Chi phí: $${meta.estimated_cost_usd.toFixed(6)}`
                    : '';
                const cacheStr = meta.cached ? ' | Cached ⚡' : '';
                metaTag.innerHTML = `Agent${cacheStr}${costStr}`;
                messageDiv.appendChild(metaTag);
            } else {
                const metaTag = document.createElement('span');
                metaTag.className = 'meta-tag';
                metaTag.innerText = sender === 'user' ? 'Bạn' : 'Agent';
                messageDiv.appendChild(metaTag);
            }

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function handleSend() {
            const query = chatInput.value.trim();
            if (!query) return;

            chatInput.value = '';
            appendMessage('user', query);

            // Add typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message agent';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="bubble">Agent đang suy nghĩ...</div>';
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: query })
                });

                // Remove typing indicator
                const typingIndicator = document.getElementById('typingIndicator');
                if (typingIndicator) typingIndicator.remove();

                if (response.ok) {
                    const data = await response.json();
                    appendMessage('agent', data.response, {
                        estimated_cost_usd: data.estimated_cost_usd,
                        cached: data.cached
                    });
                } else {
                    const err = await response.json();
                    appendMessage('agent', `Lỗi hệ thống: ${err.detail || 'Không thể xử lý tin nhắn'}`);
                }
            } catch (err) {
                const typingIndicator = document.getElementById('typingIndicator');
                if (typingIndicator) typingIndicator.remove();
                appendMessage('agent', `Lỗi kết nối server: ${err.message}`);
            }
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
